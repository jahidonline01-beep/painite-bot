name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - '*.py'
      - 'requirements.txt'
      - 'Procfile'
      - 'nixpacks.toml'
      - 'railway.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service painite-bot
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
